<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card bg-dark text-white p-4 shadow-lg border-secondary" style="max-width: 400px; width: 100%; border-radius: 12px;">
    
    <div class="text-center mb-4">
      <h2 class="fw-bold" style="color: #00e5ff;">RAMcore</h2>
      <p class="text-muted small">Panel de Administración</p>
    </div>

    <div class="alert alert-danger py-2 small text-center" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="onLogin()">
      
      <div class="mb-3">
        <label class="form-label small text-info">Correo Electrónico</label>
        <input 
          type="email" 
          name="user" 
          [(ngModel)]="user" 
          class="form-control bg-transparent text-white border-secondary" 
          placeholder="admin@ramcore.com"
          required>
      </div>

      <div class="mb-4">
        <label class="form-label small text-info">Contraseña</label>
        <input 
          type="password" 
          name="password" 
          [(ngModel)]="password" 
          class="form-control bg-transparent text-white border-secondary" 
          placeholder="123456"
          required>
      </div>

      <button type="submit" class="btn btn-info w-100 fw-bold mb-2 text-dark" style="border-radius: 8px; background-color: #00e5ff; border: none;">
        Iniciar Sesión
      </button>

    </form>

  </div>
</div>
