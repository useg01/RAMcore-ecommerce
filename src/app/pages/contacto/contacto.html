<div class="container py-5" style="max-width: 700px;">
  <div class="text-center mb-5">
    <h1 class="display-5 fw-bold text-white">Ponte en Contacto</h1>
    <p class="text-light">¿Tienes dudas sobre compatibilidad de componentes? Escríbenos.</p>
  </div>

  <div class="p-4 rounded shadow-lg" style="background-color: #161b22; border: 1px solid #30363d;">
    <form (submit)="$event.preventDefault()">
      <div class="row g-3">
        <div class="col-12 col-md-6">
          <label class="form-label text-info small fw-bold">Nombre Completo</label>
          <input type="text" class="form-control bg-dark text-white border-secondary" placeholder="Gean">
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label text-info small fw-bold">Correo Electrónico</label>
          <input type="email" class="form-control bg-dark text-white border-secondary" placeholder="correo@ejemplo.com">
        </div>
        <div class="col-12">
          <label class="form-label text-info small fw-bold">Asunto</label>
          <input type="text" class="form-control bg-dark text-white border-secondary" placeholder="Consulta técnica, cotización...">
        </div>
        <div class="col-12">
          <label class="form-label text-info small fw-bold">Mensaje</label>
          <textarea class="form-control bg-dark text-white border-secondary" rows="4" placeholder="Escribe aquí los componentes que deseas cotizar..."></textarea>
        </div>
        <div class="col-12 mt-4">
          <button type="submit" class="btn btn-info w-100 fw-bold text-dark" style="background-color: #00e5ff; border: none;">
            Enviar Mensaje
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
